name: reviewdog
on: [pull_request]

jobs:
  actions-cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: shogo82148/actions-cfn-lint@f60f019b342a9a3196d16a1a62b4aac9d1d79911 # v4.67.1
        with:
          reporter: github-pr-review
          level: warning
          cfn_lint_args: "**/*.yaml"
