name: reviewdog
on: [pull_request]

jobs:
  actions-cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: shogo82148/actions-cfn-lint@66d6c6634e8e3d8911ae231eff2a313deae94f61 # v4.68.0
        with:
          reporter: github-pr-review
          level: warning
          cfn_lint_args: "**/*.yaml"
