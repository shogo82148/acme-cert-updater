name: reviewdog
on: [pull_request]

jobs:
  actions-cfn-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: shogo82148/actions-cfn-lint@6f8c2917e7d7c8bf4e447b3c793e2112ba5b317f # v4.66.0
        with:
          reporter: github-pr-review
          level: warning
          cfn_lint_args: "**/*.yaml"
