name: test
on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: integration-test
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - name: install dependencies
        run: |
          pip install --upgrade pip
          pip install pipenv
          pipenv update --dev

      - name: Configure AWS Credentials
        uses: fuller-inc/actions-aws-assume-role@c6cc1f39a57c0228a4b542ae2b3d49d3e56ce85a # v1.9.1
        with:
          aws-region: ap-northeast-1
          role-to-assume: arn:aws:iam::445285296882:role/acme-cert-updater-test-TestRole-SPRNY1U43M59
          role-session-tagging: true

      - name: Login to ECR Public
        run: |
          aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

      - name: test
        run: |
          pipenv run make test
          pipenv run make validate
          pipenv run make build

      - name: Logout from ECR Public
        run: |
          docker login public.ecr.aws
