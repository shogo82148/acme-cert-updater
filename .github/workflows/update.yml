name: update
on:
  schedule:
    - cron: "53 12 * * *"
  workflow_dispatch:

jobs:
  requirements:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write

    steps:
      - id: generate_token
        uses: shogo82148/actions-github-app-token@84232dc4d9bd875d4dd83e3e5c4705db1c98a997 # v1.3.1

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: update
        id: update
        run: |
          pip install --upgrade pip
          pip install pipenv
          pipenv update --dev
          pipenv requirements > updater/requirements_new.txt

          # boto3 and botocore are updated very often, so ignore them
          diff <(cat updater/requirements.txt | grep -v -E 'boto(3|core)') \
            <(cat updater/requirements_new.txt | grep -v -E 'boto(3|core)') && true
          echo "result=$?" >> "$GITHUB_OUTPUT"
          mv updater/requirements_new.txt updater/requirements.txt

      - name: commit
        if: steps.update.outputs.result == '1'
        uses: shogo82148/actions-commit-and-create-pr@b1322fe9da4037e9720e34ea221997cffcd3498d # v1.1.4
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          head-branch-prefix: "auto-update/"
          commit-message: "update dependencies"
